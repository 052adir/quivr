name: keep-alive

# Pings the Render free-tier service every few minutes so it does not spin
# down. Without this, the first visitor after 15 min of idle sees Render's
# "service waking up" splash for ~30-60s. Best-effort: GitHub may delay
# scheduled runs, so for rock-solid uptime use a paid plan or UptimeRobot.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
              https://mentor-trade.onrender.com/healthz || true)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 20
          done
          echo "service did not return 200 (will retry next run)"
          exit 0
